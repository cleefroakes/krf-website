<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>KRF Portal — Kenya Rollball Federation</title>
<link rel="stylesheet" href="css/portal.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  window.ENV_SUPABASE_URL      = '%%SUPABASE_URL%%';
  window.ENV_SUPABASE_ANON_KEY = '%%SUPABASE_ANON_KEY%%';
  window.ENV_API_BASE          = '/api';
</script>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen">
  <div class="login-kicker">🇰🇪 Kenya Rollball Federation</div>
  <div class="login-box">
    <div class="login-logo">KRF <span>PORTAL</span></div>
    <div class="login-sub">Member access — your role loads automatically</div>

    <div class="role-grid" id="roleGrid"></div>

    <div id="loginForm">
      <div class="field"><label>Email / Member ID</label><input type="text" id="loginEmail" placeholder="email@krfkenya.co.ke" autocomplete="email"/></div>
      <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn-login" onclick="doLogin()">SIGN IN →</button>
      <div class="login-hint">
        New player? <span onclick="showRegForm()">Register here</span> ·
        <span onclick="showToast('Reset link sent to your email')">Forgot password</span>
      </div>
    </div>

    <div id="registerForm" style="display:none">
      <div class="field"><label>Full Name</label><input type="text" id="regName" placeholder="As on National ID"/></div>
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="yourname@email.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="regPass" placeholder="Min. 8 characters"/></div>
      <button class="btn-login" style="background:var(--green)" onclick="doRegister()">CREATE ACCOUNT →</button>
      <div class="login-hint"><span onclick="showLoginForm()">← Back to login</span></div>
    </div>
  </div>
</div>

<!-- ═══ APP SHELL ═══ -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-brand">
      <div class="logo">KRF <span>PORTAL</span></div>
    </div>
    <div class="sb-user">
      <div class="sb-avatar" id="sbAv">??</div>
      <div class="sb-user-info">
        <div class="uname" id="sbName">Loading...</div>
        <div class="urole" id="sbRole">Role</div>
      </div>
    </div>
    <div class="sb-live-pill" onclick="nav('live')">
      <div class="ld"></div>
      <span id="sbLivePill">LIVE — Loading...</span>
    </div>
    <nav class="sb-nav" id="sideNav"></nav>
    <div class="sb-bottom">
      <button class="btn-small" onclick="window.location.href='/'">← Public Site</button>
      <button class="btn-small danger" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="tb-title" id="tbTitle">OVERVIEW</div>
        <div class="tb-sub"   id="tbSub">Dashboard</div>
      </div>
      <div class="tb-right">
        <div class="tb-chip live">● LIVE</div>
        <div class="tb-chip" id="tbSeason">KPL 2025</div>
        <div class="tb-chip role" id="tbRole">Member</div>
      </div>
    </div>
    <div class="content" id="mainContent">
      <div style="display:flex;align-items:center;justify-content:center;height:60vh;color:var(--dim);font-size:.85rem">
        Loading portal...
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ═══ PAGE RENDER ENGINE ═══ -->
<script>
// ─────────────────────────────────────────────
// LOGIN FORM TOGGLE
// ─────────────────────────────────────────────
function showRegForm() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
  // Force player role tab when registering
  const tabs = document.querySelectorAll('.role-tab');
  tabs.forEach(t => t.classList.remove('active'));
  const playerTab = document.querySelector('.role-tab[data-role="player"]');
  if (playerTab) { playerTab.classList.add('active'); selectRole('player', playerTab); }
}
function showLoginForm() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('registerForm').style.display = 'none';
}

// ─────────────────────────────────────────────
// ALL PAGE RENDERS — delegates from portal.js
// ─────────────────────────────────────────────
window.renderPortalPageById = function(id) {
  const renders = {
    overview,   live,        lineup,     events,
    report,     playerreg,   teamreg,    users,
    teams_admin,tournaments, gallery,    settings,
    profile,    mystats,     schedule,
    commlive,   precheck,    incidents,  countersign,
    boundary,   lineview,    linesign,   mydocs,
  };
  if (renders[id]) renders[id]();
  else document.getElementById('mainContent').innerHTML =
    `<div style="padding:2rem;color:var(--dim)">Page "${id}" coming soon.</div>`;
};

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function panel(title, tag, body) {
  return `<div class="panel">
    <div class="ph"><span class="pt">${title}</span><span class="pg">${tag}</span></div>
    <div class="pb">${body}</div>
  </div>`;
}

function signoffChainHTML() {
  const s = STATE.reportState;
  return `<div class="signoff-chain">
    <div class="sof-step done">✓ Events logged</div><div class="sof-arrow">→</div>
    <div class="sof-step ${s.refSubmitted?'done':'current'}">Referee submits${s.refSubmitted?' ✓':''}</div><div class="sof-arrow">→</div>
    <div class="sof-step ${s.lineSignedOff?'done':s.refSubmitted?'current':'pending'}">Linesman signs${s.lineSignedOff?' ✓':''}</div><div class="sof-arrow">→</div>
    <div class="sof-step ${s.commCountersigned?'locked':s.lineSignedOff?'current':'pending'}">${s.commCountersigned?'🔒 Locked':'Commissioner countersigns'}</div><div class="sof-arrow">→</div>
    <div class="sof-step ${s.commCountersigned?'done':'pending'}">Admin publishes${s.commCountersigned?' ✓':''}</div>
  </div>`;
}

function scoreMiniHTML() {
  const m = STATE.liveMatch;
  const home = m?.home_team?.name || 'Home Team';
  const away = m?.away_team?.name || 'Away Team';
  return `<div style="background:var(--bg3);border-radius:6px;padding:.75rem;text-align:center">
    <div style="font-size:.6rem;color:var(--dim);letter-spacing:.8px;margin-bottom:.4rem;text-transform:uppercase">${m?.tournament?.name||'KPL'} · ${m?.venue||'Nyayo Stadium'}</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:1rem">
      <span style="font-size:.82rem;font-weight:600">${home}</span>
      <span id="miniScore" style="font-family:var(--font-head);font-size:2rem;color:var(--gold);letter-spacing:3px">${STATE.liveH} — ${STATE.liveA}</span>
      <span style="font-size:.82rem;font-weight:600">${away}</span>
    </div>
    <div id="miniTimer" style="font-size:.68rem;color:var(--red);margin-top:.3rem;font-weight:500">Q${STATE.period} · In Progress</div>
  </div>`;
}

function schedMiniHTML() {
  const upcoming = (STATE.schedules||[]).filter(m=>m.status==='upcoming').slice(0,3);
  if (!upcoming.length) return '<div style="color:var(--dim);font-size:.78rem;padding:.25rem 0">No upcoming fixtures</div>';
  return upcoming.map(s=>{
    const d = s.match_date ? new Date(s.match_date).toLocaleDateString('en-KE',{weekday:'short',day:'numeric',month:'short'}) : 'TBC';
    return `<div style="display:flex;align-items:center;gap:.65rem;padding:.45rem 0;border-bottom:1px solid rgba(255,255,255,.03)">
      <div style="text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:.28rem .5rem;min-width:38px;flex-shrink:0">
        <div style="font-family:var(--font-head);font-size:1.1rem;color:var(--gold);line-height:1">${new Date(s.match_date||Date.now()).getDate()}</div>
        <div style="font-size:.5rem;color:var(--muted);text-transform:uppercase">${d.split(' ')[0]}</div>
      </div>
      <div style="flex:1">
        <div style="font-size:.78rem;font-weight:500;color:var(--white)">${s.home_team?.name||'TBC'} vs ${s.away_team?.name||'TBC'}</div>
        <div style="font-size:.62rem;color:var(--dim);margin-top:1px">${d} · ${s.tournament?.name||''}</div>
      </div>
    </div>`;
  }).join('');
}

function docProgressHTML(docs, navTarget) {
  const done = docs.filter(d=>d.status==='done'||d.status==='approved').length;
  const pct  = docs.length ? Math.round((done/docs.length)*100) : 0;
  return `<div class="prog-wrap">
    <div class="prog-label"><span>${done}/${docs.length} docs</span><span style="color:var(--gold);font-weight:600">${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>
  ${docs.slice(0,4).map(d=>`
    <div style="display:flex;align-items:center;gap:.4rem;padding:.28rem 0;font-size:.74rem;border-bottom:1px solid rgba(255,255,255,.025)">
      <span>${d.icon||'📄'}</span>
      <span style="flex:1;color:var(--soft)">${d.label||d.doc_type}</span>
      <span class="bdg bdg-${d.status==='approved'||d.status==='done'?'green':d.status==='flagged'?'red':'gray'}">${d.status}</span>
    </div>`).join('')}
  <button class="btn-s" style="width:100%;margin-top:.55rem;font-size:.7rem;padding:.32rem" onclick="nav('${navTarget||'mydocs'}')">View All →</button>`;
}

function docsGridHTML(docs) {
  return `<div class="doc-grid">${docs.map(d=>`
    <div class="doc-item ${d.status==='approved'||d.status==='done'?'done':d.status==='flagged'?'flagged':''}"
         onclick="triggerDocUpload('${d.id||d.doc_type}')">
      <div class="di-icon">${d.icon||'📄'}</div>
      <div class="di-info"><strong>${d.label||d.doc_type}</strong><small>${d.sub||d.description||''}</small></div>
      <span class="di-st ${d.status==='approved'||d.status==='done'?'done':d.status==='flagged'?'flagged':'pending'}">${d.status==='approved'||d.status==='done'?'✓':d.status==='flagged'?'⚠':'+'}</span>
    </div>`).join('')}</div>`;
}

function triggerDocUpload(docType) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.pdf,.jpg,.jpeg,.png,.webp';
  input.onchange = async (e) => {
    if (e.target.files[0]) await handleDocUpload(e.target, docType);
  };
  input.click();
}

function eventItemsHTML(events, max=20) {
  const iconMap = { goal:'⚽', yellow:'🟨', red_card:'🟥', foul:'🔴', sub:'🔄', injury:'🩹', boundary:'🚩', offside:'⛔' };
  return events.slice(0,max).map(e=>`
    <div class="ev-item">
      <span class="ev-min">${e.min||e.minute+"'"}</span>
      <div class="ev-ico ${e.type||e.event_type}">${e.icon||iconMap[e.event_type]||'◉'}</div>
      <span class="ev-desc">${e.desc||e.description||''}</span>
      <span class="ev-by">${e.by||e.logged_by_role||''}</span>
    </div>`).join('');
}

  {id:'kra_pin',             label:'KRA PIN Certificate',  sub:'Revenue authority',      icon:'📌', status:'pending'},

  {id:'contact_emails',    label:'Contact Emails',     sub:'Manager + all officials',    icon:'📧', status:'pending'},
];

function getCurrentDocs() {
  const role = STATE.user?.role;
  const loaded = STATE.docs || [];
  const base = role === 'player' ? PLAYER_DOCS : OFFICIAL_DOCS;
  // Merge loaded statuses into static definitions
  return base.map(d => {
    const live = loaded.find(l => l.doc_type === d.id);
    return live ? { ...d, status: live.status } : d;
  });
}

// ─────────────────────────────────────────────
// ── OVERVIEW
// ─────────────────────────────────────────────
function overview() {
  const role = STATE.user?.role;
  if (role === 'player')       return overviewPlayer();
  if (role === 'referee')      return overviewReferee();
  if (role === 'commissioner') return overviewCommissioner();
  if (role === 'linesman')     return overviewLinesman();
  if (role === 'official')     return overviewOfficial();
  overviewAdmin();
}

    <div class="stat-row">
      <div class="sc" style="--sc-color:var(--red)"><div class="v">${STATE.teams?.length||12}</div><div class="l">Teams</div><div class="ch ch-neu">All registered</div></div>

function logBoundaryCall(type, team) {
  const elapsed = Math.max(1, STATE.period*15 - Math.floor(STATE.matchTimer/60));
  const icon = type.includes('Offside')?'⛔':type.includes('Sub')?'🔄':'🚩';
  STATE.events.unshift({ min:elapsed+"'", type:'boundary', icon, desc:`${type}${team?' — '+team:''}`, by:'linesman' });
  const list = document.getElementById('lineCallsList');
  if (list) {
    const myEvents = STATE.events.filter(e=>(e.by||e.logged_by_role)==='linesman');
    list.innerHTML = eventItemsHTML(myEvents);
  }
  showToast(`Logged: ${type}${team?' ('+team+')':''}`);
}

          <div style="display:flex;align-items:center;justify-content:space-between;padding:.42rem .6rem;background:var(--bg3);border-radius:5px;font-size:.78rem;margin-bottom:.35rem">
            <span>${s}</span>
            <button class="btn-s" style="font-size:.6rem;padding:.18rem .45rem" onclick="showToast('Editing sponsor')">Edit</button>
          </div>`).join('')}
        <button class="btn-p" style="width:100%;margin-top:.5rem;font-size:.78rem;padding:.5rem" onclick="showToast('Add sponsor form')">+ ADD SPONSOR</button>`)}</div>
    </div>`;
}

// ─────────────────────────────────────────────
// ── PLAYER PAGES
// ─────────────────────────────────────────────
function profile() {
  const docs = getCurrentDocs();
  document.getElementById('mainContent').innerHTML = `
    <div class="prof-head">
      <div class="prof-av" style="background:var(--green-dim);color:var(--green);border-color:rgba(39,174,96,.4)">
        ${STATE.user?.initials||'PL'}
        <div class="prof-cam" onclick="triggerDocUpload('passport_photo')">📷</div>
      </div>
      <div>
        <div class="pname">${STATE.user?.name||'Player'}</div>
        <div class="ppos">${STATE.user?.position||'—'} · #${STATE.user?.jersey_number||'—'}</div>
        <div class="ptags"><span class="bdg bdg-green">Active</span><span class="bdg bdg-gold">KPL 2025</span></div>
      </div>
    </div>
    <div class="g2">
      <div>
        <div class="fsec"><div class="fsec-title">Edit Profile</div>
          <div class="fgrid">
            <div class="fg"><label>Full Name</label><input id="pName" value="${STATE.user?.name||''}"/></div>
            <div class="fg"><label>Phone</label><input id="pPhone" value="${STATE.user?.phone||''}"/></div>
            <div class="fg"><label>Email</label><input value="${STATE.user?.email||''}" readonly/></div>
            <div class="fg"><label>County</label><input value="${STATE.user?.county||''}"/></div>
            <div class="fg"><label>Position</label>
              <select id="pPos"><option>Centre Man</option><option>Front Right</option><option>Front Left</option><option>Winger Right</option><option>Winger Left</option></select>
            </div>
            <div class="fg"><label>Jersey #</label><input type="number" id="pJersey" value="${STATE.user?.jersey_number||''}" min="1" max="99"/></div>
          </div>
        </div>
        <button class="btn-p" onclick="handleSaveProfile()">UPDATE PROFILE</button>
      </div>
      <div>
        <div class="fsec"><div class="fsec-title">My Documents</div>${docsGridHTML(docs)}</div>
      </div>
    </div>`;
}

function mystats() {
  document.getElementById('mainContent').innerHTML = `
    <div class="stat-row">
      <div class="sc" style="--sc-color:var(--red)"><div class="v">—</div><div class="l">Goals</div><div class="ch ch-neu">This season</div></div>
      <div class="sc" style="--sc-color:var(--gold)"><div class="v">—</div><div class="l">Games</div><div class="ch ch-neu">Played</div></div>
      <div class="sc" style="--sc-color:var(--green)"><div class="v">—</div><div class="l">Assists</div><div class="ch ch-neu">This season</div></div>
      <div class="sc" style="--sc-color:var(--blue)"><div class="v">—</div><div class="l">Rank</div><div class="ch ch-neu">Top scorers</div></div>
    </div>
    <div style="padding:2rem;text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:8px">
      <div style="font-size:2rem;opacity:.2;margin-bottom:.75rem">📊</div>
      <div style="font-size:.85rem;color:var(--dim)">Your stats will appear here once match data is synced from the live system.</div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:.5rem">Stats update automatically after each match is published by admin.</div>
    </div>`;
}

function schedule() {
  const upcoming = (STATE.schedules||[]).filter(m=>m.status==='upcoming');
  document.getElementById('mainContent').innerHTML = `
    ${panel('UPCOMING FIXTURES','Your team schedule',
      upcoming.length ? upcoming.map(s=>{
        const d = s.match_date ? new Date(s.match_date).toLocaleDateString('en-KE',{weekday:'short',day:'numeric',month:'short'}) : 'TBC';
        const t = s.match_date ? new Date(s.match_date).toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}) : '';
        return `<div style="display:flex;align-items:center;gap:.75rem;padding:.65rem 0;border-bottom:1px solid rgba(255,255,255,.03)">
          <div style="text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:.3rem .55rem;min-width:40px;flex-shrink:0">
            <div style="font-family:var(--font-head);font-size:1.2rem;color:var(--gold);line-height:1">${new Date(s.match_date||Date.now()).getDate()}</div>
            <div style="font-size:.5rem;color:var(--muted);text-transform:uppercase">${d.split(',')[0]}</div>
          </div>
          <div style="flex:1">
            <div style="font-size:.83rem;font-weight:600;color:var(--white)">${s.home_team?.name||'TBC'} vs ${s.away_team?.name||'TBC'}</div>
            <div style="font-size:.7rem;color:var(--dim);margin-top:2px">${t} · ${s.venue||'TBC'} · ${s.tournament?.name||''}</div>
          </div>
          <span class="bdg bdg-amber">Upcoming</span>
        </div>`;
      }).join('') : '<div style="color:var(--dim);font-size:.78rem;padding:.5rem 0">No upcoming fixtures scheduled</div>'
    )}`;
}
</script>

<script src="js/portal.js"></script>
